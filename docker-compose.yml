version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: blps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: web3_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: rewtqasw3253
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d web3_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blps-app
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9990:9990"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: web3_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: rewtqasw3253
    volumes:
      - ./security-users.xml:/opt/jboss/security-users.xml

volumes:
  postgres_data:
